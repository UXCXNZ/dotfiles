command_timeout = 500   # Cap slow git/lang operations at 500ms
scan_timeout = 100      # Faster directory scanning

format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#3d59a1 fg:#a3aed2)\
$directory\
[](fg:#3d59a1 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[](fg:#212736 bg:#1d2230)\
$time\
[ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#c0caf5 bg:#3d59a1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#c0caf5 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#c0caf5 bg:#394260)]($style)'
ignore_submodules = true

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#3d59a1 bg:#212736)]($style)'

[rust]
disabled = true

[golang]
disabled = true

[php]
disabled = true

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[os]
disabled = false
style = "bg:#a3aed2 fg:#090c0c"

[os.symbols]
Macos = " "

[character]
success_symbol = '[❯](bold #73daca)'  # Tokyo Night teal
error_symbol = '[❯](bold #f7768e)'    # Tokyo Night red