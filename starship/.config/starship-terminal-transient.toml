# Pure-style Starship configuration for Terminal.app with transient prompt
# Previous prompts become minimal after execution

format = """
$directory\
$git_branch\
$git_status
$character """

[directory]
style = "bold blue"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "~"

[git_branch]
style = "cyan"
format = "[$branch]($style) "

[git_status]
style = "red"
format = "[$all_status$ahead_behind]($style) "

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

# Transient prompt - replaces previous prompts with just "❯"
[transient_prompt]
disabled = false
format = """$character"""