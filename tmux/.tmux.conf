set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-resurrect' # Temporarily disabled
# set -g @plugin 'tmux-plugins/tmux-continuum' # Temporarily disabled
# set -g @plugin 'fabioluciano/tmux-tokyo-night'  # Disabled to use custom status bar

# set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Custom Status bar configuration (AFTER plugins to override theme)
set -g status on
set -g status-position top  # or 'bottom'
set -g status-interval 1
set -g status-left-length 100
set -g status-right-length 100

# Tokyo Night colors for status bar
set -g status-style 'bg=#1a1b26 fg=#c0caf5'

# Use Starship-like format in status bar
set -g status-left '#[fg=#7aa2f7,bold]  #S #[default]'  # Session name with icon
set -g status-right '#[fg=#7aa2f7]#(cd #{pane_current_path} && ~/.tmux/starship-tmux.sh) #[fg=#bb9af7] #[fg=#e0af68] %H:%M '
